<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* Canvas сердце */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

/* текст */
.text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 15%;
    font-size: 42px;
    color: #ff4d6d;
    text-shadow: 0 0 20px #ff004c, 0 0 50px #ff004c;
    z-index: 10;
}

/* звёзды */
.star {
    position: absolute;
    color: white;
    font-size: 10px;
    opacity: 0.8;
    animation: fall linear forwards;
    z-index: 0;
}

@keyframes fall {
    from {
        transform: translateY(-20px);
        opacity: 1;
    }
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="text">I miss you cami 💖</div>

<canvas id="canvas"></canvas>

<script>

// ===== СЕРДЦЕ =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function heart(x, y, size) {
    ctx.beginPath();

    for (let i = 0; i < Math.PI * 2; i += 0.01) {
        const hx = 16 * Math.pow(Math.sin(i), 3);
        const hy = 13 * Math.cos(i)
            - 5 * Math.cos(2 * i)
            - 2 * Math.cos(3 * i)
            - Math.cos(4 * i);

        ctx.lineTo(x + hx * size, y - hy * size);
    }

    ctx.closePath();

    ctx.shadowColor = "#ff004c";
    ctx.shadowBlur = 25;

    ctx.fillStyle = "#ff2d55";
    ctx.fill();
}

function animateHeart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let scale = 12 + Math.sin(t) * 2;

    heart(canvas.width / 2, canvas.height / 2, scale);

    t += 0.05;
    requestAnimationFrame(animateHeart);
}

animateHeart();

// ===== ЗВЁЗДЫ =====
function createStar() {
    const star = document.createElement("div");
    star.classList.add("star");

    star.innerHTML = "✦";

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.fontSize = (6 + Math.random() * 6) + "px";
    star.style.animationDuration = (3 + Math.random() * 4) + "s";

    document.body.appendChild(star);

    setTimeout(() => {
        star.remove();
    }, 7000);
}

setInterval(createStar, 120);

// resize
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
